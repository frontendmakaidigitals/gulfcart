name: Server Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Clear Next.js cache
        run: rm -rf .next

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          python3 -c "
          import os
          key = os.environ['SSH_KEY']
          with open(os.path.expanduser('~/.ssh/id_ed25519'), 'w') as f:
              f.write(key + '\n')
          "
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}


      - name: Copy files to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p 22 -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --no-times \
            --no-perms \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_PATH }}/

      - name: Install & Restart on server
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 22 -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ${{ secrets.APP_PATH }}
            npm ci --production --ignore-scripts
            rm -rf .next/standalone/.next/static
            cp -r .next/static .next/standalone/.next/
            cp -r public .next/standalone/public
            /usr/bin/pm2 restart ecosystem.config.js --update-env || \
            /usr/bin/pm2 start ecosystem.config.js
            /usr/bin/pm2 save
          EOF
