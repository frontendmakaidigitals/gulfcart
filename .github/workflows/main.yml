name: Server Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Clear Next.js cache
        run: rm -rf .next

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          python3 -c "
          import os
          key = os.environ['SSH_KEY']
          with open(os.path.expanduser('~/.ssh/id_ed25519'), 'w') as f:
              f.write(key + '\n')
          "
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Copy files to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p 22 -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --no-times \
            --no-perms \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_PATH }}/

      - name: Install & Restart on server
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 22 -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e # Exit immediately if a command exits with a non-zero status
            cd ${{ secrets.APP_PATH }}
            
            # 1. Install production dependencies
            npm ci --omit=dev --ignore-scripts
            
            # 2. Setup Next.js standalone assets
            rm -rf .next/standalone/.next/static
            cp -r .next/static .next/standalone/.next/
            cp -r public .next/standalone/public
            
            # 3. Correctly write ecosystem.config.js using a Node script
            node -e "
            const fs = require('fs');
            const config = {
              apps: [{
                name: 'Gulfcart',
                script: '.next/standalone/server.js',
                cwd: process.cwd(),
                env: {
                  NODE_ENV: 'production',
                  PORT: '3002'
                }
              }]
            };
            fs.writeFileSync('ecosystem.config.js', 'module.exports = ' + JSON.stringify(config, null, 2));
            console.log('ecosystem.config.js written successfully.');
            "
            
            # 4. Restart or Start the app via PM2
            pm2 restart ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save
          EOF
